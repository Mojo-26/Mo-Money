<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ledger</title>
<style>
  :root{
    --bg:#1c1c1e;
    --bg-elevated:#2c2c2e;
    --bg-elevated-2:#3a3a3c;
    --border:#3a3a3c;
    --text:#f2f2f7;
    --text-secondary:#9ba1a6;
    --text-muted:#6e6e73;
    --accent:#5dcaa5;
    --accent-dark:#0f6e56;
    --expense:#f0997b;
    --expense-dark:#d85a30;
    --income:#5dcaa5;
    --warn:#f7c15c;
    --danger:#e0655f;
    --radius:14px;
    --radius-sm:8px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
    padding-bottom:78px;
  }
  h1,h2,h3{font-weight:600; margin:0 0 4px;}
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit;}
  .app{max-width:520px; margin:0 auto; min-height:100vh; position:relative;}
  .topbar{
    padding:18px 18px 10px; position:sticky; top:0; background:var(--bg); z-index:5;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar h1{font-size:20px;}
  .month-switch{display:flex; align-items:center; gap:10px;}
  .month-switch button{
    background:var(--bg-elevated); border:none; color:var(--text); width:30px; height:30px;
    border-radius:50%; font-size:16px; cursor:pointer;
  }
  .month-switch span{font-size:14px; color:var(--text-secondary); min-width:110px; text-align:center;}
  .screen{display:none; padding:0 18px 24px;}
  .screen.active{display:block;}
  .card{
    background:var(--bg-elevated); border-radius:var(--radius); padding:16px;
    margin-bottom:12px;
  }
  .card-row{display:flex; justify-content:space-between; align-items:center;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:var(--bg-elevated); border-radius:var(--radius); padding:12px 10px; text-align:left;}
  .stat .label{font-size:11px; color:var(--text-secondary); margin-bottom:4px;}
  .stat .value{font-size:17px; font-weight:600;}
  .stat .value.expense{color:var(--expense);}
  .stat .value.income{color:var(--income);}
  .section-title{
    font-size:13px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-secondary);
    margin:20px 0 10px;
  }
  .list-item{
    display:flex; align-items:center; justify-content:space-between; padding:10px 0;
    border-bottom:0.5px solid var(--border);
  }
  .list-item:last-child{border-bottom:none;}
  .li-left{display:flex; align-items:center; gap:10px;}
  .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .li-title{font-size:14px;}
  .li-sub{font-size:12px; color:var(--text-muted);}
  .amt{font-size:14px; font-weight:600;}
  .amt.expense{color:var(--expense);}
  .amt.income{color:var(--income);}
  .progress-track{background:var(--bg-elevated-2); border-radius:6px; height:8px; overflow:hidden; margin-top:8px;}
  .progress-fill{height:100%; border-radius:6px;}
  .empty{color:var(--text-muted); font-size:13px; text-align:center; padding:24px 0;}
  .btn{
    background:var(--bg-elevated-2); color:var(--text); border:none; border-radius:var(--radius-sm);
    padding:11px 16px; font-size:14px; cursor:pointer; font-weight:500;
  }
  .btn.primary{background:var(--accent); color:#04342c;}
  .btn.danger{background:var(--danger); color:#fff;}
  .btn.block{width:100%;}
  .btn.ghost{background:transparent; border:0.5px solid var(--border); color:var(--text-secondary);}
  .btn-row{display:flex; gap:8px; margin-top:12px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--bg-elevated-2); border:0.5px solid var(--border); color:var(--text);
    padding:11px 12px; border-radius:var(--radius-sm); font-size:15px;
  }
  .field textarea{resize:vertical; min-height:50px;}
  .type-toggle{display:flex; background:var(--bg-elevated-2); border-radius:var(--radius-sm); padding:3px; margin-bottom:16px;}
  .type-toggle button{
    flex:1; background:transparent; border:none; color:var(--text-secondary); padding:9px; border-radius:6px;
    font-size:14px; font-weight:500; cursor:pointer;
  }
  .type-toggle button.active{background:var(--bg-elevated); color:var(--text);}
  .type-toggle button.active[data-type="income"]{color:var(--income);}
  .type-toggle button.active[data-type="expense"]{color:var(--expense);}
  .nav{
    position:fixed; bottom:0; left:0; right:0; background:rgba(28,28,30,0.95); backdrop-filter:blur(10px);
    border-top:0.5px solid var(--border); display:flex; z-index:10;
  }
  .nav-inner{max-width:520px; margin:0 auto; display:flex; width:100%;}
  .nav button{
    flex:1; background:none; border:none; color:var(--text-muted); padding:9px 4px 8px; font-size:10px;
    cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  .nav button.active{color:var(--accent);}
  .nav svg{width:20px; height:20px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:8px;}
  .cal-dow{font-size:10px; color:var(--text-muted); text-align:center; padding-bottom:4px;}
  .cal-day{
    aspect-ratio:1; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:12px; cursor:pointer; position:relative; background:var(--bg-elevated-2); color:var(--text-secondary);
  }
  .cal-day.empty{background:transparent; cursor:default;}
  .cal-day.today{border:1px solid var(--accent);}
  .cal-day.selected{background:var(--accent); color:#04342c; font-weight:600;}
  .cal-day .dots{display:flex; gap:2px; margin-top:2px;}
  .cal-day .dots span{width:4px; height:4px; border-radius:50%;}
  .cat-chip{
    display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:20px;
    background:var(--bg-elevated-2); font-size:13px; margin:0 6px 6px 0; cursor:pointer; border:1px solid transparent;
  }
  .cat-chip.selected{border-color:var(--accent);}
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); display:none; align-items:flex-end;
    justify-content:center; z-index:20;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--bg-elevated); width:100%; max-width:520px; border-radius:18px 18px 0 0;
    padding:20px 18px 28px; max-height:85vh; overflow-y:auto;
  }
  .modal-handle{width:36px; height:4px; background:var(--bg-elevated-2); border-radius:2px; margin:0 auto 14px;}
  .modal h3{font-size:16px; margin-bottom:14px;}
  .close-x{position:absolute; right:16px; top:16px; background:none; border:none; color:var(--text-secondary); font-size:20px; cursor:pointer;}
  .bar-row{margin-bottom:12px;}
  .bar-row .bar-track{background:var(--bg-elevated-2); border-radius:6px; height:20px; overflow:hidden; margin-top:4px;}
  .bar-row .bar-fill{height:100%; border-radius:6px;}
  .report-card{cursor:pointer;}
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--bg-elevated-2);
    color:var(--text); padding:10px 18px; border-radius:20px; font-size:13px; z-index:30; opacity:0;
    transition:opacity 0.25s; pointer-events:none;
  }
  .toast.show{opacity:1;}
  .fab{
    position:fixed; bottom:88px; right:20px; width:54px; height:54px; border-radius:50%; background:var(--accent);
    color:#04342c; border:none; font-size:26px; box-shadow:0 4px 14px rgba(0,0,0,0.4); cursor:pointer; z-index:8;
  }
  a{color:var(--accent);}
  .small-note{font-size:12px; color:var(--text-muted); margin-top:6px;}
  .swipe-actions{display:flex; gap:8px;}
  .icon-btn{background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px;}
  .badge{font-size:10px; padding:2px 7px; border-radius:10px; background:var(--bg-elevated-2); color:var(--text-secondary);}
  hr.sep{border:none; border-top:0.5px solid var(--border); margin:16px 0;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="topbar">
    <h1 id="screen-title">Ledger</h1>
    <div class="month-switch" id="month-switch">
      <button id="prev-month">&#8249;</button>
      <span id="month-label">July 2026</span>
      <button id="next-month">&#8250;</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <section class="screen active" id="screen-dashboard">
    <div class="stat-grid">
      <div class="stat"><div class="label">Income</div><div class="value income" id="dash-income">$0</div></div>
      <div class="stat"><div class="label">Spent</div><div class="value expense" id="dash-spent">$0</div></div>
      <div class="stat"><div class="label">Left over</div><div class="value" id="dash-left">$0</div></div>
    </div>

    <div class="section-title">Savings goals</div>
    <div class="card" id="dash-goals"></div>

    <div class="section-title">Upcoming scheduled</div>
    <div class="card" id="dash-upcoming"></div>

    <div class="section-title">Recent activity</div>
    <div class="card" id="dash-recent"></div>
  </section>

  <!-- ADD ENTRY -->
  <section class="screen" id="screen-add">
    <div class="type-toggle" id="entry-type-toggle">
      <button data-type="expense" class="active">Expense</button>
      <button data-type="income">Income</button>
    </div>
    <div class="field">
      <label>Amount</label>
      <input type="number" step="0.01" min="0" id="entry-amount" placeholder="0.00">
    </div>
    <div class="field">
      <label>Category</label>
      <div id="entry-category-chips"></div>
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="entry-date">
    </div>
    <div class="field">
      <label>Note (optional)</label>
      <textarea id="entry-note" placeholder="What was this for?"></textarea>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <label style="display:flex; align-items:center; justify-content:space-between; cursor:pointer;">
        <span>
          <span class="li-title">Repeats monthly</span><br>
          <span class="li-sub">Automatically add this again every month</span>
        </span>
        <input type="checkbox" id="entry-recurring" style="width:20px; height:20px;">
      </label>
      <div id="entry-recurring-day-wrap" style="display:none; margin-top:12px;">
        <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:6px;">Repeats on day of month</label>
        <input type="number" min="1" max="31" id="entry-recurring-day">
      </div>
    </div>
    <button class="btn primary block" id="save-entry-btn">Save entry</button>
  </section>

  <!-- HISTORY -->
  <section class="screen" id="screen-history">
    <div class="card">
      <div class="cal-grid" id="cal-dow-row"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="section-title" id="history-day-label">Entries</div>
    <div class="card" id="history-day-list"></div>
  </section>

  <!-- CATEGORIES -->
  <section class="screen" id="screen-categories">
    <div class="card" id="categories-list"></div>
    <button class="btn ghost block" id="manage-categories-btn" style="margin-top:12px;">Manage categories</button>
  </section>

  <!-- REPORTS -->
  <section class="screen" id="screen-reports">
    <div class="type-toggle" id="report-type-toggle">
      <button data-rtype="monthly" class="active">Monthly</button>
      <button data-rtype="weekly">Weekly</button>
    </div>
    <div id="reports-body"></div>
  </section>

  <!-- SETTINGS -->
  <section class="screen" id="screen-settings">
    <div class="section-title">Recurring expenses</div>
    <div class="card" id="recurring-list"></div>
    <button class="btn ghost block" id="add-recurring-btn" style="margin-top:8px;">Add recurring expense</button>

    <div class="section-title">Categories</div>
    <div class="card" id="settings-categories-list"></div>
    <button class="btn ghost block" id="add-category-btn" style="margin-top:8px;">Add category</button>

    <div class="section-title">Data</div>
    <div class="card">
      <button class="btn block" id="export-btn">Export backup (JSON)</button>
      <div class="btn-row">
        <button class="btn block" id="import-btn">Import backup</button>
        <input type="file" id="import-file" accept="application/json" style="display:none;">
      </div>
      <p class="small-note">Your data lives only in this browser. Export a backup now and then so you never lose it.</p>
      <hr class="sep">
      <button class="btn danger block" id="reset-btn">Erase all data</button>
    </div>
  </section>

  <div class="nav">
    <div class="nav-inner" id="nav-inner">
      <button data-screen="dashboard" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Home
      </button>
      <button data-screen="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        History
      </button>
      <button data-screen="add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
        Add
      </button>
      <button data-screen="categories">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>
        Categories
      </button>
      <button data-screen="reports">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-6"/></svg>
        Reports
      </button>
      <button data-screen="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33h0a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51h0a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </div>

  <button class="fab" id="fab-add">+</button>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---------- DATA LAYER ---------- */
const STORAGE_KEY = 'ledger_data_v1';
const COLORS = ['#5dcaa5','#f0997b','#7f77dd','#ed93b1','#378ade','#eb9f27','#639922','#e24b4a','#b4b2a9'];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function defaultData(){
  return {
    categories: [
      {id:'cat_food', name:'Food', kind:'expense', color:'#f0997b', budget:null},
      {id:'cat_rent', name:'Rent', kind:'expense', color:'#7f77dd', budget:null},
      {id:'cat_transport', name:'Transportation', kind:'expense', color:'#378ade', budget:null},
      {id:'cat_utilities', name:'Utilities', kind:'expense', color:'#eb9f27', budget:null},
      {id:'cat_entertainment', name:'Entertainment', kind:'expense', color:'#ed93b1', budget:null},
      {id:'cat_shopping', name:'Shopping', kind:'expense', color:'#639922', budget:null},
      {id:'cat_health', name:'Health', kind:'expense', color:'#e24b4a', budget:null},
      {id:'cat_other_exp', name:'Other', kind:'expense', color:'#b4b2a9', budget:null},
      {id:'cat_salary', name:'Salary', kind:'income', color:'#5dcaa5', budget:null},
      {id:'cat_freelance', name:'Freelance', kind:'income', color:'#5dcaa5', budget:null},
      {id:'cat_gift', name:'Gift', kind:'income', color:'#5dcaa5', budget:null},
      {id:'cat_other_inc', name:'Other income', kind:'income', color:'#5dcaa5', budget:null},
    ],
    entries: [],
    recurring: [],
    goals: [],
    reports: [],
  };
}

let DATA = load();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultData();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultData(), parsed);
  }catch(e){
    console.error('load failed', e);
    return defaultData();
  }
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
  }catch(e){
    showToast('Could not save — storage may be full');
  }
}

/* ---------- HELPERS ---------- */
function fmt(n){
  const num = Number(n)||0;
  return '$' + num.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtShort(n){
  const num = Number(n)||0;
  return '$' + num.toLocaleString(undefined,{maximumFractionDigits:0});
}
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function ymd(date){
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}
function catById(id){ return DATA.categories.find(c=>c.id===id); }
function monthLabel(y,m){
  return new Date(y,m,1).toLocaleString(undefined,{month:'long', year:'numeric'});
}
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function openModal(html){
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}
function confirmDialog(message, onConfirm, confirmLabel){
  confirmLabel = confirmLabel || 'Delete';
  openModal(`
    <div class="modal-handle"></div>
    <h3>Are you sure?</h3>
    <p class="li-sub" style="margin-bottom:18px;">${escapeHtml(message)}</p>
    <div class="btn-row">
      <button class="btn ghost block" id="confirm-cancel-btn">Cancel</button>
      <button class="btn danger block" id="confirm-ok-btn">${escapeHtml(confirmLabel)}</button>
    </div>
  `);
  document.getElementById('confirm-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('confirm-ok-btn').addEventListener('click', ()=>{
    closeModal();
    onConfirm();
  });
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('active');
}
document.getElementById('modal-overlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modal-overlay') closeModal();
});

/* ---------- STATE ---------- */
const now = new Date();
let state = {
  screen: 'dashboard',
  year: now.getFullYear(),
  month: now.getMonth(),
  selectedDay: todayISO(),
  entryType: 'expense',
  entryCategory: null,
  reportType: 'monthly',
};

/* ---------- RECURRING PROCESSING ---------- */
function processRecurring(){
  const today = new Date();
  today.setHours(0,0,0,0);
  let added = 0;
  DATA.recurring.forEach(r=>{
    if(!r.active) return;
    const start = new Date(r.startDate + 'T00:00:00');
    let cursor = new Date(start.getFullYear(), start.getMonth(), Math.min(r.day, daysInMonth(start.getFullYear(), start.getMonth())));
    while(cursor <= today){
      const occurDateStr = ymd(cursor);
      const already = DATA.entries.some(e=> e.recurringId===r.id && e.date===occurDateStr);
      if(!already && cursor >= start){
        DATA.entries.push({
          id: uid(), type: r.type, amount: r.amount, categoryId: r.categoryId,
          date: occurDateStr, note: r.name, recurringId: r.id
        });
        added++;
      }
      const y = cursor.getFullYear(), m = cursor.getMonth()+1;
      const nextMonthDate = new Date(y, m, 1);
      cursor = new Date(nextMonthDate.getFullYear(), nextMonthDate.getMonth(), Math.min(r.day, daysInMonth(nextMonthDate.getFullYear(), nextMonthDate.getMonth())));
    }
  });
  if(added>0) save();
}

/* ---------- NAVIGATION ---------- */
const titles = {dashboard:'Ledger', add:'Add entry', history:'History', categories:'Categories', reports:'Reports', settings:'Settings'};
function showScreen(name){
  state.screen = name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.screen===name));
  document.getElementById('screen-title').textContent = titles[name];
  document.getElementById('month-switch').style.display = (name==='dashboard'||name==='history'||name==='categories'||name==='reports') ? 'flex' : 'none';
  renderScreen(name);
}
document.getElementById('nav-inner').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-screen]');
  if(btn) showScreen(btn.dataset.screen);
});
document.getElementById('fab-add').addEventListener('click', ()=>showScreen('add'));

document.getElementById('prev-month').addEventListener('click', ()=>{
  state.month--; if(state.month<0){state.month=11; state.year--;}
  renderScreen(state.screen);
});
document.getElementById('next-month').addEventListener('click', ()=>{
  state.month++; if(state.month>11){state.month=0; state.year++;}
  renderScreen(state.screen);
});

function renderScreen(name){
  document.getElementById('month-label').textContent = monthLabel(state.year, state.month);
  if(name==='dashboard') renderDashboard();
  else if(name==='add') renderAdd();
  else if(name==='history') renderHistory();
  else if(name==='categories') renderCategories();
  else if(name==='reports') renderReports();
  else if(name==='settings') renderSettings();
}

/* ---------- MONTH DATA CALC ---------- */
function entriesForMonth(y,m){
  const prefix = y+'-'+String(m+1).padStart(2,'0');
  return DATA.entries.filter(e=>e.date.startsWith(prefix));
}
function monthTotals(y,m){
  const es = entriesForMonth(y,m);
  let income=0, expense=0;
  es.forEach(e=>{ if(e.type==='income') income+=Number(e.amount); else expense+=Number(e.amount); });
  return {income, expense, left: income-expense, entries: es};
}
function categoryTotalsForMonth(y,m,kind){
  const es = entriesForMonth(y,m);
  const totals = {};
  es.forEach(e=>{
    const c = catById(e.categoryId);
    if(!c || c.kind!==kind) return;
    totals[c.id] = (totals[c.id]||0) + Number(e.amount);
  });
  return totals;
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const t = monthTotals(state.year, state.month);
  document.getElementById('dash-income').textContent = fmtShort(t.income);
  document.getElementById('dash-spent').textContent = fmtShort(t.expense);
  document.getElementById('dash-left').textContent = fmtShort(t.left);

  const goalsEl = document.getElementById('dash-goals');
  if(DATA.goals.length===0){
    goalsEl.innerHTML = '<div class="empty">No savings goals yet. Add one in Settings.</div>';
  }else{
    goalsEl.innerHTML = DATA.goals.map(g=>{
      const saved = (g.contributions||[]).reduce((s,c)=>s+Number(c.amount),0);
      const pct = Math.min(100, Math.round((saved/g.target)*100));
      return `<div style="margin-bottom:14px;">
        <div class="card-row"><span class="li-title">${escapeHtml(g.name)}</span><span class="li-sub">${fmtShort(saved)} / ${fmtShort(g.target)}</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:var(--accent);"></div></div>
      </div>`;
    }).join('');
  }

  const upcomingEl = document.getElementById('dash-upcoming');
  const today = new Date(); today.setHours(0,0,0,0);
  const in14 = new Date(today); in14.setDate(in14.getDate()+14);
  let upcoming = [];
  DATA.recurring.filter(r=>r.active).forEach(r=>{
    for(let d = new Date(today); d<=in14; d.setDate(d.getDate()+1)){
      if(d.getDate()===Math.min(r.day, daysInMonth(d.getFullYear(),d.getMonth()))){
        upcoming.push({name:r.name, amount:r.amount, type:r.type, date: new Date(d)});
      }
    }
  });
  upcoming.sort((a,b)=>a.date-b.date);
  if(upcoming.length===0){
    upcomingEl.innerHTML = '<div class="empty">Nothing scheduled in the next 14 days.</div>';
  }else{
    upcomingEl.innerHTML = upcoming.slice(0,6).map(u=>`
      <div class="list-item">
        <div class="li-left"><div><div class="li-title">${escapeHtml(u.name)}</div><div class="li-sub">${u.date.toLocaleDateString(undefined,{month:'short', day:'numeric'})}</div></div></div>
        <div class="amt ${u.type}">${u.type==='income'?'+':'-'}${fmtShort(u.amount)}</div>
      </div>`).join('');
  }

  const recentEl = document.getElementById('dash-recent');
  const recent = [...t.entries].sort((a,b)=> b.date.localeCompare(a.date)).slice(0,6);
  if(recent.length===0){
    recentEl.innerHTML = '<div class="empty">No entries yet this month.</div>';
  }else{
    recentEl.innerHTML = recent.map(entryRowEditable).join('');
    recentEl.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click', ()=>editEntry(el.dataset.edit)));
    recentEl.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click', ()=>deleteEntry(el.dataset.del)));
  }
}

function entryRow(e){

function escapeHtml(s){

  document.getElementById('entry-recurring-day-wrap').style.display = 'none';

});
document.getElementById('entry-date').addEventListener('change', (e)=>{

});
document.getElementById('save-entry-btn').addEventListener('click', ()=>{
  const amount = parseFloat(document.getElementById('entry-amount').value);

  const date = document.getElementById('entry-date').value || todayISO();
  const note = document.getElementById('entry-note').value.trim();

  const makeRecurring = document.getElementById('entry-recurring').checked;
  let recurringId = undefined;
  if(makeRecurring){
    const day = Math.min(31, Math.max(1, parseInt(document.getElementById('entry-recurring-day').value)||parseInt(date.slice(8,10))));
    const cat = catById(state.entryCategory);
    const rec = {
      id: uid(), name: note || (cat?cat.name:'Recurring'), amount,
      categoryId: state.entryCategory, day, startDate: date, active: true, type: state.entryType
    };

/* ---------- HISTORY / CALENDAR ---------- */
function renderHistory(){
  const dowRow = document.getElementById('cal-dow-row');
  dowRow.innerHTML = ['S','M','T','W','T','F','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const grid = document.getElementById('cal-grid');
  const y = state.year, m = state.month;
  const firstDow = new Date(y,m,1).getDay();
  const total = daysInMonth(y,m);
  const entriesByDay = {};
  entriesForMonth(y,m).forEach(e=>{
    (entriesByDay[e.date] = entriesByDay[e.date]||[]).push(e);
  });
  let html='';
  for(let i=0;i<firstDow;i++) html += '<div class="cal-day empty"></div>';
  for(let d=1; d<=total; d++){
    const dateStr = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = dateStr === todayISO();
    const isSelected = dateStr === state.selectedDay;
    const dayEntries = entriesByDay[dateStr] || [];
    const dots = dayEntries.slice(0,3).map(e=>{
      const c = catById(e.categoryId);
      return `<span style="background:${e.type==='income'?'#5dcaa5':(c?c.color:'#888')}"></span>`;
    }).join('');
    html += `<div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''}" data-date="${dateStr}">
      <span>${d}</span><div class="dots">${dots}</div></div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-day[data-date]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.selectedDay = el.dataset.date;
      renderHistory();
    });
  });
  renderDayList();
}
function renderDayList(){
  const label = document.getElementById('history-day-label');
  const listEl = document.getElementById('history-day-list');
  const dateObj = new Date(state.selectedDay+'T00:00:00');
  label.textContent = dateObj.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
  const dayEntries = DATA.entries.filter(e=>e.date===state.selectedDay);
  if(dayEntries.length===0){
    listEl.innerHTML = '<div class="empty">No entries this day.</div><button class="btn ghost block" id="add-for-day">Add entry for this day</button>';
  }else{
    listEl.innerHTML = dayEntries.map(e=>entryRowEditable(e)).join('') +
      '<button class="btn ghost block" id="add-for-day" style="margin-top:10px;">Add another entry</button>';
    listEl.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click', ()=>editEntry(el.dataset.edit)));
    listEl.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click', ()=>deleteEntry(el.dataset.del)));
  }
  const addBtn = document.getElementById('add-for-day');
  if(addBtn) addBtn.addEventListener('click', ()=>{ showScreen('add'); });
}
function entryRowEditable(e){

/* ---------- REPORTS ---------- */
document.getElementById('report-type-toggle').addEventListener('click',(e)=>{
  const btn = e.target.closest('button[data-rtype]');
  if(!btn) return;
  state.reportType = btn.dataset.rtype;
  document.querySelectorAll('#report-type-toggle button').forEach(b=>b.classList.toggle('active', b===btn));
  renderReports();
});

function buildMonthlySnapshot(y,m){
  const t = monthTotals(y,m);
  const catTotals = categoryTotalsForMonth(y,m,'expense');
  const prevM = m===0?11:m-1, prevY = m===0?y-1:y;
  const prevT = monthTotals(prevY, prevM);
  const recurringHit = t.entries.filter(e=>e.recurringId).length;
  const goalsSnapshot = DATA.goals.map(g=>{
    const contribThisMonth = (g.contributions||[]).filter(c=>c.date.startsWith(y+'-'+String(m+1).padStart(2,'0'))).reduce((s,c)=>s+Number(c.amount),0);
    return {name:g.name, contributed:contribThisMonth};
  });
  return {
    year:y, month:m, income:t.income, expense:t.expense, left:t.left,
    categoryTotals: catTotals, prevIncome: prevT.income, prevExpense: prevT.expense,
    recurringHit, goalsSnapshot
  };
}
function getWeeksInMonth(y,m){
  const total = daysInMonth(y,m);
  const weeks = [];
  let start = 1;
  while(start<=total){
    let end = Math.min(start+6, total);
    weeks.push({start, end});
    start = end+1;
  }
  return weeks;
}
function weekTotals(y,m,startDay,endDay){
  let income=0, expense=0;
  const catTotals = {};
  DATA.entries.forEach(e=>{
    const d = new Date(e.date+'T00:00:00');
    if(d.getFullYear()===y && d.getMonth()===m && d.getDate()>=startDay && d.getDate()<=endDay){
      if(e.type==='income') income+=Number(e.amount);
      else{
        expense+=Number(e.amount);
        const c = catById(e.categoryId);
        if(c) catTotals[c.id] = (catTotals[c.id]||0)+Number(e.amount);
      }
    }
  });
  return {income, expense, catTotals};
}

function renderReports(){
  const body = document.getElementById('reports-body');
  const y = state.year, m = state.month;
  if(state.reportType==='monthly'){
    const existing = DATA.reports.find(r=>r.type==='monthly' && r.year===y && r.month===m);
    const isPast = (y<now.getFullYear()) || (y===now.getFullYear() && m<now.getMonth());
    let html = '';
    if(!existing){
      html += `<div class="card">
        <p style="margin:0 0 10px; font-size:14px; color:var(--text-secondary);">
          ${isPast? 'No saved report for this month yet.' : 'This month is still in progress — you can still generate a snapshot report anytime.'}
        </p>
        <button class="btn primary block" id="gen-report-btn">Generate ${monthLabel(y,m)} report</button>
      </div>`;
    }else{
      html += renderReportDetail(existing.data);
      html += `<button class="btn ghost block" id="regen-report-btn" style="margin-top:10px;">Regenerate with latest data</button>`;
    }
    html += '<div class="section-title">Saved monthly reports</div><div class="card" id="saved-reports-list"></div>';
    body.innerHTML = html;
    const genBtn = document.getElementById('gen-report-btn') || document.getElementById('regen-report-btn');
    if(genBtn) genBtn.addEventListener('click', ()=>{
      const snapshot = buildMonthlySnapshot(y,m);
      const idx = DATA.reports.findIndex(r=>r.type==='monthly'&&r.year===y&&r.month===m);
      const reportObj = {id: idx>=0?DATA.reports[idx].id:uid(), type:'monthly', year:y, month:m, generatedAt:new Date().toISOString(), data:snapshot};
      if(idx>=0) DATA.reports[idx]=reportObj; else DATA.reports.push(reportObj);
      save();
      showToast('Report saved');
      renderReports();
    });
    renderSavedReportsList('monthly');
  }else{
    const weeks = getWeeksInMonth(y,m);
    let html = '<div class="card">';
    weeks.forEach((w,i)=>{
      const wt = weekTotals(y,m,w.start,w.end);
      html += `<div style="margin-bottom:${i<weeks.length-1?'16px':'0'};">
        <div class="card-row"><span class="li-title">Week ${i+1} <span class="li-sub">(${w.start}–${w.end})</span></span></div>
        <div class="card-row" style="margin-top:6px;">
          <span class="li-sub">Income</span><span class="amt income">${fmt(wt.income)}</span>
        </div>
        <div class="card-row">
          <span class="li-sub">Spent</span><span class="amt expense">${fmt(wt.expense)}</span>
        </div>
      </div>`;
      if(i<weeks.length-1) html += '<hr class="sep">';
    });
    html += '</div>';
    body.innerHTML = html;
  }
}
function renderReportDetail(d){
  const catRows = Object.entries(d.categoryTotals).sort((a,b)=>b[1]-a[1]).map(([cid,amt])=>{
    const c = catById(cid);
    const max = Math.max(...Object.values(d.categoryTotals), 1);
    const pct = Math.round((amt/max)*100);
    return `<div class="bar-row">
      <div class="card-row"><span class="li-sub">${c?escapeHtml(c.name):'Other'}</span><span class="li-sub">${fmt(amt)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${c?c.color:'#888'};"></div></div>
    </div>`;
  }).join('') || '<div class="empty">No expenses recorded.</div>';

  const incomeDelta = d.prevIncome ? Math.round(((d.income-d.prevIncome)/d.prevIncome)*100) : null;
  const expenseDelta = d.prevExpense ? Math.round(((d.expense-d.prevExpense)/d.prevExpense)*100) : null;

  const goalsHtml = d.goalsSnapshot.length ? d.goalsSnapshot.map(g=>
    `<div class="card-row"><span class="li-sub">${escapeHtml(g.name)}</span><span class="li-sub">${fmt(g.contributed)}</span></div>`
  ).join('') : '<div class="empty">No goal contributions this month.</div>';

  return `<div class="card">
    <div class="stat-grid">
      <div class="stat"><div class="label">Income</div><div class="value income">${fmtShort(d.income)}</div></div>
      <div class="stat"><div class="label">Spent</div><div class="value expense">${fmtShort(d.expense)}</div></div>
      <div class="stat"><div class="label">Net</div><div class="value">${fmtShort(d.left)}</div></div>
    </div>
    ${expenseDelta!==null ? `<p class="li-sub">Spending ${expenseDelta>=0?'up':'down'} ${Math.abs(expenseDelta)}% vs last month${incomeDelta!==null? ', income '+(incomeDelta>=0?'up':'down')+' '+Math.abs(incomeDelta)+'%':''}.</p>` : ''}
    <div class="section-title" style="margin-top:16px;">Spending by category</div>
    ${catRows}
    <div class="section-title">Recurring expenses applied</div>
    <p class="li-sub">${d.recurringHit} recurring charge${d.recurringHit===1?'':'s'} this month.</p>
    <div class="section-title">Savings contributions</div>
    ${goalsHtml}
  </div>`;
}
function renderSavedReportsList(type){
  const el = document.getElementById('saved-reports-list');
  if(!el) return;
  const list = DATA.reports.filter(r=>r.type===type).sort((a,b)=> (b.year-a.year) || (b.month-a.month));
  if(list.length===0){ el.innerHTML = '<div class="empty">No saved reports yet.</div>'; return; }
  el.innerHTML = list.map(r=>`<div class="list-item report-card" data-report="${r.id}">
    <span class="li-title">${monthLabel(r.year,r.month)}</span>
    <span class="li-sub">${fmtShort(r.data.expense)} spent</span>
  </div>`).join('');
  el.querySelectorAll('.report-card').forEach(row=>{
    row.addEventListener('click', ()=>{
      const r = DATA.reports.find(x=>x.id===row.dataset.report);
      openModal(`<button class="close-x" onclick="closeModal()">✕</button><div class="modal-handle"></div><h3>${monthLabel(r.year,r.month)}</h3>${renderReportDetail(r.data)}`);
    });
  });
}

          <button class="icon-btn" data-del-rec="${r.id}">✕</button>
        </div>
      </div>`;
    }).join('');
    recEl.querySelectorAll('[data-edit-rec]').forEach(el=>el.addEventListener('click',()=>openRecurringModal(el.dataset.editRec)));
    recEl.querySelectorAll('[data-del-rec]').forEach(el=>el.addEventListener('click',()=>{
      confirmDialog('Delete this recurring expense? Past entries it created will stay.', ()=>{
        DATA.recurring = DATA.recurring.filter(r=>r.id!==el.dataset.delRec);
        save(); renderSettings();
      });
    }));
  }

  const catEl = document.getElementById('settings-categories-list');
  catEl.innerHTML = DATA.categories.map(c=>`<div class="list-item">
    <div class="li-left"><span class="dot" style="background:${c.color}"></span>
      <div><div class="li-title">${escapeHtml(c.name)}</div><div class="li-sub">${c.kind}${c.budget?' · budget '+fmtShort(c.budget):''}</div></div>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="icon-btn" data-edit-cat="${c.id}">✎</button>
      <button class="icon-btn" data-del-cat="${c.id}">✕</button>
    </div>
  </div>`).join('');
  catEl.querySelectorAll('[data-edit-cat]').forEach(el=>el.addEventListener('click',()=>openCategoryModal(el.dataset.editCat)));
  catEl.querySelectorAll('[data-del-cat]').forEach(el=>el.addEventListener('click',()=>{
    const inUse = DATA.entries.some(e=>e.categoryId===el.dataset.delCat) || DATA.recurring.some(r=>r.categoryId===el.dataset.delCat);
    const doDelete = ()=>{
      DATA.categories = DATA.categories.filter(c=>c.id!==el.dataset.delCat);
      save(); renderSettings();
    };
    if(inUse){
      confirmDialog('This category has entries linked to it. Delete anyway? Entries will keep showing as uncategorized.', doDelete);
    }else{
      doDelete();
    }
  }));
}

document.getElementById('add-recurring-btn').addEventListener('click', ()=>openRecurringModal(null));
function openRecurringModal(id){
  const r = id ? DATA.recurring.find(x=>x.id===id) : null;
  const cats = DATA.categories;
  openModal(`
    <button class="close-x" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <h3>${r?'Edit':'Add'} recurring expense</h3>
    <div class="type-toggle" id="rec-type-toggle">
      <button data-type="expense" class="${(!r||r.type==='expense')?'active':''}">Expense</button>
      <button data-type="income" class="${r&&r.type==='income'?'active':''}">Income</button>
    </div>
    <div class="field"><label>Name</label><input type="text" id="rec-name" value="${r?escapeHtml(r.name):''}" placeholder="Netflix"></div>
    <div class="field"><label>Amount</label><input type="number" step="0.01" id="rec-amount" value="${r?r.amount:''}"></div>
    <div class="field"><label>Category</label><select id="rec-category"></select></div>
    <div class="field"><label>Day of month</label><input type="number" min="1" max="31" id="rec-day" value="${r?r.day:1}"></div>
    <div class="field"><label>Start date</label><input type="date" id="rec-start" value="${r?r.startDate:todayISO()}"></div>
    <div class="field"><label><input type="checkbox" id="rec-active" ${(!r||r.active)?'checked':''} style="width:auto; margin-right:6px;">Active</label></div>
    <button class="btn primary block" id="rec-save-btn">Save</button>
  `);
  let recType = r ? r.type : 'expense';
  function fillCatSelect(){
    const sel = document.getElementById('rec-category');
    sel.innerHTML = DATA.categories.filter(c=>c.kind===recType).map(c=>`<option value="${c.id}" ${r&&r.categoryId===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
  }
  fillCatSelect();
  document.getElementById('rec-type-toggle').addEventListener('click',(e)=>{
    const btn = e.target.closest('button[data-type]'); if(!btn) return;
    recType = btn.dataset.type;
    document.querySelectorAll('#rec-type-toggle button').forEach(b=>b.classList.toggle('active', b===btn));
    fillCatSelect();
  });
  document.getElementById('rec-save-btn').addEventListener('click', ()=>{
    const name = document.getElementById('rec-name').value.trim();
    const amount = parseFloat(document.getElementById('rec-amount').value);
    const categoryId = document.getElementById('rec-category').value;
    const day = Math.min(31, Math.max(1, parseInt(document.getElementById('rec-day').value)||1));
    const startDate = document.getElementById('rec-start').value || todayISO();
    const active = document.getElementById('rec-active').checked;
    if(!name || !amount || !categoryId){ showToast('Fill in all fields'); return; }
    if(r){
      Object.assign(r, {name, amount, categoryId, day, startDate, active, type:recType});
    }else{
      DATA.recurring.push({id:uid(), name, amount, categoryId, day, startDate, active, type:recType});
    }
    save();
    processRecurring();
    closeModal();
    renderSettings();
    showToast('Recurring expense saved');
  });
}

document.getElementById('add-category-btn').addEventListener('click', ()=>openCategoryModal(null));
function openCategoryModal(id){
  const c = id ? catById(id) : null;
  openModal(`
    <button class="close-x" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <h3>${c?'Edit':'Add'} category</h3>
    <div class="type-toggle" id="cat-kind-toggle">
      <button data-kind="expense" class="${(!c||c.kind==='expense')?'active':''}">Expense</button>
      <button data-kind="income" class="${c&&c.kind==='income'?'active':''}">Income</button>
    </div>
    <div class="field"><label>Name</label><input type="text" id="cat-name" value="${c?escapeHtml(c.name):''}" placeholder="Groceries"></div>
    <div class="field"><label>Monthly budget (optional, expense only)</label><input type="number" step="0.01" id="cat-budget" value="${c&&c.budget?c.budget:''}" placeholder="No limit"></div>
    <div class="field"><label>Color</label>
      <div id="cat-color-swatches" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
    </div>
    <button class="btn primary block" id="cat-save-btn">Save</button>
  `);
  let kind = c ? c.kind : 'expense';
  let color = c ? c.color : COLORS[0];
  const swatchWrap = document.getElementById('cat-color-swatches');
  swatchWrap.innerHTML = COLORS.map(col=>`<span data-col="${col}" style="width:26px; height:26px; border-radius:50%; background:${col}; cursor:pointer; display:inline-block; border:2px solid ${col===color?'#fff':'transparent'};"></span>`).join('');
  swatchWrap.querySelectorAll('span').forEach(sw=>sw.addEventListener('click', ()=>{
    color = sw.dataset.col;
    swatchWrap.querySelectorAll('span').forEach(s=>s.style.border = s===sw?'2px solid #fff':'2px solid transparent');
  }));
  document.getElementById('cat-kind-toggle').addEventListener('click',(e)=>{
    const btn = e.target.closest('button[data-kind]'); if(!btn) return;
    kind = btn.dataset.kind;
    document.querySelectorAll('#cat-kind-toggle button').forEach(b=>b.classList.toggle('active', b===btn));
  });
  document.getElementById('cat-save-btn').addEventListener('click', ()=>{
    const name = document.getElementById('cat-name').value.trim();
    const budgetVal = document.getElementById('cat-budget').value;
    const budget = budgetVal ? parseFloat(budgetVal) : null;
    if(!name){ showToast('Enter a name'); return; }
    if(c){
      Object.assign(c, {name, kind, budget: kind==='expense'?budget:null, color});
    }else{
      DATA.categories.push({id:uid(), name, kind, budget: kind==='expense'?budget:null, color});
    }
    save();
    closeModal();
    renderSettings();
    showToast('Category saved');
  });
}

/* ---------- EXPORT / IMPORT / RESET ---------- */
document.getElementById('export-btn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ledger-backup-' + todayISO() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup downloaded');
});
document.getElementById('import-btn').addEventListener('click', ()=>document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    try{
      const parsed = JSON.parse(evt.target.result);
      confirmDialog('This will replace all current data with the imported backup. Continue?', ()=>{
        DATA = Object.assign(defaultData(), parsed);
        save();
        showToast('Backup imported');
        renderScreen(state.screen);
      }, 'Import');
    }catch(err){
      showToast('That file could not be read');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('reset-btn').addEventListener('click', ()=>{
  confirmDialog('This will permanently erase all your data. This cannot be undone. Continue?', ()=>{
    confirmDialog('Are you absolutely sure? Consider exporting a backup first.', ()=>{
      DATA = defaultData();
      save();
      showToast('All data erased');
      renderScreen(state.screen);
    }, 'Erase everything');
  }, 'Continue');
});

/* ---------- GOALS (accessible via dashboard card + a small add flow in settings area) ---------- */
// Add a "goals" management entry point inside settings by inserting a button dynamically
(function addGoalsSection(){
  const settingsScreen = document.getElementById('screen-settings');
  const goalsTitle = document.createElement('div');
  goalsTitle.className = 'section-title';
  goalsTitle.textContent = 'Savings goals';
  const goalsCard = document.createElement('div');
  goalsCard.className = 'card';
  goalsCard.id = 'settings-goals-list';
  const addGoalBtn = document.createElement('button');
  addGoalBtn.className = 'btn ghost block';
  addGoalBtn.textContent = 'Add savings goal';
  addGoalBtn.style.marginTop = '8px';
  addGoalBtn.addEventListener('click', ()=>openGoalModal(null));
  settingsScreen.insertBefore(goalsTitle, settingsScreen.firstChild);
  settingsScreen.insertBefore(goalsCard, goalsTitle.nextSibling);
  settingsScreen.insertBefore(addGoalBtn, goalsCard.nextSibling);
})();
function renderGoalsSettings(){
  const el = document.getElementById('settings-goals-list');
  if(!el) return;
  if(DATA.goals.length===0){ el.innerHTML = '<div class="empty">No savings goals yet.</div>'; return; }
  el.innerHTML = DATA.goals.map(g=>{
    const saved = (g.contributions||[]).reduce((s,c)=>s+Number(c.amount),0);
    return `<div class="list-item">
      <div><div class="li-title">${escapeHtml(g.name)}</div><div class="li-sub">${fmtShort(saved)} of ${fmtShort(g.target)}${g.deadline?' · by '+g.deadline:''}</div></div>
      <div style="display:flex; gap:10px;">
        <button class="icon-btn" data-contribute="${g.id}">＋</button>
        <button class="icon-btn" data-edit-goal="${g.id}">✎</button>
        <button class="icon-btn" data-del-goal="${g.id}">✕</button>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('[data-contribute]').forEach(b=>b.addEventListener('click', ()=>openContributeModal(b.dataset.contribute)));
  el.querySelectorAll('[data-edit-goal]').forEach(b=>b.addEventListener('click', ()=>openGoalModal(b.dataset.editGoal)));
  el.querySelectorAll('[data-del-goal]').forEach(b=>b.addEventListener('click', ()=>{
    confirmDialog('Delete this savings goal? Its contribution history will be lost.', ()=>{
      DATA.goals = DATA.goals.filter(g=>g.id!==b.dataset.delGoal);
      save(); renderGoalsSettings(); renderDashboard();
    });
  }));
}
function openGoalModal(id){
  const g = id ? DATA.goals.find(x=>x.id===id) : null;
  openModal(`
    <button class="close-x" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <h3>${g?'Edit':'Add'} savings goal</h3>
    <div class="field"><label>Name</label><input type="text" id="goal-name" value="${g?escapeHtml(g.name):''}" placeholder="Trip to Japan"></div>
    <div class="field"><label>Target amount</label><input type="number" step="0.01" id="goal-target" value="${g?g.target:''}"></div>
    <div class="field"><label>Target date (optional)</label><input type="date" id="goal-deadline" value="${g&&g.deadline?g.deadline:''}"></div>
    <button class="btn primary block" id="goal-save-btn">Save</button>
  `);
  document.getElementById('goal-save-btn').addEventListener('click', ()=>{
    const name = document.getElementById('goal-name').value.trim();
    const target = parseFloat(document.getElementById('goal-target').value);
    const deadline = document.getElementById('goal-deadline').value || null;
    if(!name || !target){ showToast('Fill in name and target'); return; }
    if(g){ Object.assign(g, {name, target, deadline}); }
    else{ DATA.goals.push({id:uid(), name, target, deadline, contributions:[]}); }
    save();
    closeModal();
    renderGoalsSettings();
    renderDashboard();
    showToast('Goal saved');
  });
}
function openContributeModal(id){
  const g = DATA.goals.find(x=>x.id===id);
  if(!g) return;
  const t = monthTotals(state.year, state.month);
  openModal(`
    <button class="close-x" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <h3>Add to ${escapeHtml(g.name)}</h3>
    <p class="li-sub">This month you have ${fmt(t.left)} left over (income minus expenses).</p>
    <div class="field"><label>Amount to add</label><input type="number" step="0.01" id="contribute-amount" value="${t.left>0?t.left.toFixed(2):''}"></div>
    <button class="btn primary block" id="contribute-save-btn">Add contribution</button>
  `);
  document.getElementById('contribute-save-btn').addEventListener('click', ()=>{
    const amount = parseFloat(document.getElementById('contribute-amount').value);
    if(!amount || amount<=0){ showToast('Enter an amount'); return; }
    (g.contributions = g.contributions||[]).push({id:uid(), date: todayISO(), amount});
    save();
    closeModal();
    renderGoalsSettings();
    renderDashboard();
    showToast('Contribution added');
  });
}
const _origRenderSettings = renderSettings;
renderSettings = function(){ _origRenderSettings(); renderGoalsSettings(); };

/* ---------- INIT ---------- */
processRecurring();
renderScreen('dashboard');
</script>
